<!--
Thoughtful Reads - Header Component
This component contains the main navigation, logo, and search functionality.
Customize the navigation items, logo, and search behavior as needed.
-->

<header class="site-header">
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <!-- Site Logo/Brand -->
            <a class="navbar-brand" href="index.html" aria-label="Thoughtful Reads - Home">
                <i class="fas fa-book-open me-2" aria-hidden="true"></i>Thoughtful Reads
            </a>

            <!-- Mobile Menu Toggle -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain" 
                    aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Main Navigation -->
            <div class="collapse navbar-collapse" id="navbarMain">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">Home</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" 
                           aria-expanded="false" aria-haspopup="true">
                            Categories
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                            <li><a class="dropdown-item" href="category.html?cat=productivity">Productivity</a></li>
                            <li><a class="dropdown-item" href="category.html?cat=technology">Technology</a></li>
                            <li><a class="dropdown-item" href="category.html?cat=lifestyle">Lifestyle</a></li>
                            <li><a class="dropdown-item" href="category.html?cat=health">Health & Wellness</a></li>
                            <li><a class="dropdown-item" href="category.html?cat=business">Business</a></li>
                            <li><a class="dropdown-item" href="category.html?cat=travel">Travel</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contact</a>
                    </li>
                </ul>

                <!-- Right Side Navigation Items -->
                <div class="d-flex align-items-center">
                    <!-- Search Form -->
                    <form class="search-form me-3 d-none d-md-flex" role="search">
                        <div class="input-group input-group-sm">
                            <input class="form-control search-input" type="search" placeholder="Search articles..." 
                                   aria-label="Search articles">
                            <button class="btn btn-outline-primary" type="submit" aria-label="Submit search">
                                <i class="fas fa-search" aria-hidden="true"></i>
                            </button>
                        </div>
                    </form>

                    <!-- Newsletter Signup Button (Mobile) -->
                    <button class="btn btn-outline-primary btn-sm me-2 d-lg-none" 
                            data-bs-toggle="modal" data-bs-target="#newsletterModal"
                            aria-label="Subscribe to newsletter">
                        <i class="fas fa-envelope" aria-hidden="true"></i>
                    </button>

                    <!-- Mobile Search Toggle -->
                    <button class="btn btn-outline-secondary btn-sm me-2 d-lg-none search-toggle" 
                            type="button" aria-label="Toggle search">
                        <i class="fas fa-search" aria-hidden="true"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Mobile Search Form (Hidden by default) -->
    <div class="mobile-search-container container d-lg-none" style="display: none;">
        <form class="search-form py-3" role="search">
            <div class="input-group">
                <input class="form-control search-input" type="search" placeholder="Search articles..." 
                       aria-label="Search articles">
                <button class="btn btn-primary" type="submit" aria-label="Submit search">
                    <i class="fas fa-search" aria-hidden="true"></i>
                </button>
            </div>
        </form>
    </div>
</header>

<script>
// Mobile search toggle functionality
document.addEventListener('DOMContentLoaded', function() {
    const searchToggle = document.querySelector('.search-toggle');
    const mobileSearchContainer = document.querySelector('.mobile-search-container');
    
    if (searchToggle && mobileSearchContainer) {
        searchToggle.addEventListener('click', function() {
            const isVisible = mobileSearchContainer.style.display !== 'none';
            mobileSearchContainer.style.display = isVisible ? 'none' : 'block';
            
            if (!isVisible) {
                // Focus search input when shown
                const searchInput = mobileSearchContainer.querySelector('.search-input');
                if (searchInput) {
                    setTimeout(() => searchInput.focus(), 100);
                }
            }
        });
    }
});
</script>
