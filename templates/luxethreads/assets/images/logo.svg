<?xml version="1.0" encoding="UTF-8"?>
<svg width="40" height="40" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Fashion-Inspired Logo -->
    <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#B8860B;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#8B4513;stop-opacity:0.8" />
        </linearGradient>
        
        <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#F8F9FA;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#E9ECEF;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#DEE2E6;stop-opacity:1" />
        </linearGradient>
        
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#2C3E50" flood-opacity="0.2"/>
        </filter>
    </defs>
    
    <!-- Outer Diamond Frame -->
    <path d="M80,20 L140,80 L80,140 L20,80 Z" 
          stroke="url(#goldGrad)" stroke-width="3" fill="none" opacity="0.3"/>
    
    <!-- Main Thread Loop (forms an 'L' shape) -->
    <path d="M60,50 Q40,60 50,80 Q60,100 80,90 Q100,80 90,60 Q80,40 60,50 Z" 
          stroke="url(#goldGrad)" stroke-width="6" fill="none" stroke-linecap="round" 
          stroke-linejoin="round" filter="url(#shadow)"/>
    
    <!-- Thread Crossing (forms a 'T' shape) -->
    <path d="M100,70 L100,110 M90,90 L110,90" 
          stroke="url(#silverGrad)" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Elegant Stitch Points -->
    <g fill="url(#goldGrad)">
        <circle cx="60" cy="50" r="3"/>
        <circle cx="80" cy="40" r="2"/>
        <circle cx="100" cy="60" r="3"/>
        <circle cx="90" cy="90" r="4"/>
        <circle cx="70" cy="100" r="2"/>
    </g>
    
    <!-- Subtle Texture Lines -->
    <g stroke="url(#silverGrad)" stroke-width="0.5" opacity="0.3">
        <line x1="30" y1="30" x2="130" y2="30"/>
        <line x1="30" y1="50" x2="130" y2="50"/>
        <line x1="30" y1="70" x2="130" y2="70"/>
        <line x1="30" y1="90" x2="130" y2="90"/>
        <line x1="30" y1="110" x2="130" y2="110"/>
        <line x1="30" y1="130" x2="130" y2="130"/>
    </g>
</svg>